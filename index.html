<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance System</title>
  <!-- QRCode.js for generating QR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .card {
      width: 100%;
      max-width: 420px;
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    
    .header {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      padding: 25px;
      text-align: center;
      color: white;
    }
    
    .header h1 { font-size: 1.5rem; }
    .header p { opacity: 0.8; font-size: 0.9rem; margin-top: 5px; }
    
    .body { padding: 25px; }
    
    /* QR Display Section */
    .qr-section {
      text-align: center;
      margin-bottom: 20px;
      padding: 20px;
      background: #0f172a;
      border-radius: 12px;
      border: 2px dashed #334155;
    }
    
    .qr-section h3 {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    #qrcode {
      display: flex;
      justify-content: center;
      margin: 10px auto;
    }
    
    .qr-section p {
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 10px;
    }
    
    /* Form Section */
    .form-section {
      display: none;
    }
    
    .form-section.active {
      display: block;
    }
    
    .form-group { margin-bottom: 15px; }
    
    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .token-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }
    
    .token-btn {
      aspect-ratio: 1;
      border: 2px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .token-btn:hover { border-color: #3b82f6; background: #1e293b; }
    .token-btn.selected { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    .type-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .type-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .type-btn.selected { background: #10b981; border-color: #10b981; color: white; }
    .type-btn.exit.selected { background: #f59e0b; border-color: #f59e0b; }
    
    .btn-submit {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }
    
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    #result {
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      display: none;
      font-weight: 600;
    }
    
    #result.success { background: #064e3b; color: #6ee7b7; border: 1px solid #10b981; }
    #result.error { background: #450a0a; color: #fca5a5; border: 1px solid #ef4444; }
    
    .spinner {
      display: none;
      width: 30px;
      height: 30px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .success-check {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    
    .divider {
      height: 1px;
      background: #334155;
      margin: 20px 0;
    }
    
    .scan-text {
      text-align: center;
      color: #64748b;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>🎯 Attendance System</h1>
      <p>Scan QR → Enter Token → Log In/Out</p>
    </div>
    
    <div class="body">
      
      <!-- QR CODE DISPLAY (for scanning) -->
      <div id="qrDisplay" class="qr-section">
        <h3>📱 Scan This QR to Log Attendance</h3>
        <div id="qrcode"></div>
        <p>Point your phone camera here</p>
      </div>
      
      <div class="divider"></div>
      
      <!-- ATTENDANCE FORM (shown when page opened via QR scan) -->
      <div id="formSection" class="form-section">
        <p class="scan-text" style="color:#6ee7b7; margin-bottom:15px;">✅ QR Scanned! Now log your attendance</p>
        
        <div class="form-group">
          <label>Token Number (1-10)</label>
          <div class="token-grid" id="tokenGrid"></div>
        </div>
        
        <div class="form-group">
          <label>Type</label>
          <div class="type-toggle">
            <button class="type-btn selected" onclick="setType('Entry', this)">🟢 Entry</button>
            <button class="type-btn exit" onclick="setType('Exit', this)">🟠 Exit</button>
          </div>
        </div>
        
        <button class="btn-submit" id="submitBtn" onclick="submit()">✅ OK - Log Attendance</button>
      </div>
      
      <!-- MANUAL FORM (always visible for direct access) -->
      <div id="manualForm">
        <p class="scan-text" style="margin-bottom:15px;">Or enter directly below:</p>
        
        <div class="form-group">
          <label>Token Number (1-10)</label>
          <div class="token-grid" id="tokenGridManual"></div>
        </div>
        
        <div class="form-group">
          <label>Type</label>
          <div class="type-toggle">
            <button class="type-btn selected" onclick="setType('Entry', this)">🟢 Entry</button>
            <button class="type-btn exit" onclick="setType('Exit', this)">🟠 Exit</button>
          </div>
        </div>
        
        <button class="btn-submit" id="submitBtnManual" onclick="submit()">✅ OK - Log Attendance</button>
      </div>
      
      <div class="spinner" id="spinner"></div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    // 🔴 REPLACE THIS WITH YOUR ACTUAL GOOGLE APPS SCRIPT WEB APP URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwqeIxkHN7onuEb0EnbvpNXgb0GBPXYiwdEZbBgDOEqZbeWm_pwsY4VK7yJppnEqRbvMQ/exec';
    
    // Get current page URL (for QR generation)
    const CURRENT_URL = window.location.href.split('?')[0];
    
    let selectedToken = null;
    let selectedType = 'Entry';
    
    // Build token buttons for both grids
    function buildTokenGrid(containerId) {
      const grid = document.getElementById(containerId);
      for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'token-btn';
        btn.textContent = i;
        btn.onclick = function() { selectToken(i, this); };
        grid.appendChild(btn);
      }
    }
    
    buildTokenGrid('tokenGrid');
    buildTokenGrid('tokenGridManual');
    
    function selectToken(num, btn) {
      selectedToken = num;
      // Remove selected from ALL token buttons
      document.querySelectorAll('.token-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }
    
    function setType(type, btn) {
      selectedType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }
    
    // Generate QR Code pointing to this page
    function generateQR() {
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';
      new QRCode(qrContainer, {
        text: CURRENT_URL,
        width: 200,
        height: 200,
        colorDark: '#1e293b',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }
    
    // Check if opened from QR scan (any query params)
    function checkQRScan() {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.toString().length > 0) {
        // Hide QR, show form prominently
        document.getElementById('qrDisplay').style.display = 'none';
        document.getElementById('manualForm').style.display = 'none';
        document.getElementById('formSection').classList.add('active');
      }
    }
    
    function submit() {
      if (!selectedToken) {
        showResult('❌ Select a token number (1-10)!', 'error');
        return;
      }
      
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('submitBtnManual').disabled = true;
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      
      // Use JSONP to avoid CORS issues with Google Apps Script
      const callbackName = 'handleResponse_' + Date.now();
      window[callbackName] = function(data) {
        handleResponse(data);
        delete window[callbackName];
        document.head.removeChild(script);
      };
      
      const script = document.createElement('script');
      script.src = `${GAS_URL}?action=log&token=${selectedToken}&type=${selectedType}&callback=${callbackName}`;
      document.head.appendChild(script);
      
      // Fallback timeout
      setTimeout(() => {
        if (window[callbackName]) {
          delete window[callbackName];
          document.head.removeChild(script);
          handleResponse({ success: false, message: '❌ Request timed out' });
        }
      }, 10000);
    }
    
    function handleResponse(data) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtnManual').disabled = false;
      
      if (data.success) {
        showResult(`<div class="success-check">✅</div>${data.message}`, 'success');
        beep();
        // Reset
        selectedToken = null;
        document.querySelectorAll('.token-btn').forEach(b => b.classList.remove('selected'));
      } else {
        showResult(data.message, 'error');
      }
    }
    
    function showResult(msg, type) {
      const r = document.getElementById('result');
      r.className = type;
      r.innerHTML = msg;
      r.style.display = 'block';
      setTimeout(() => { r.style.display = 'none'; }, 4000);
    }
    
    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 1200;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch(e) {}
    }
    
    // Initialize
    generateQR();
    checkQRScan();
  </script>
</body>
</html>

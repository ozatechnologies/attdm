<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In/Out Attendance</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .card {
      width: 100%;
      max-width: 400px;
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    
    .header {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      padding: 25px;
      text-align: center;
      color: white;
    }
    
    .header h1 { font-size: 1.5rem; }
    .header p { opacity: 0.8; font-size: 0.9rem; margin-top: 5px; }
    
    .body { padding: 25px; }
    
    #reader {
      width: 100% !important;
      border-radius: 12px !important;
      overflow: hidden !important;
      margin-bottom: 20px;
    }
    
    .btn-cam {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 15px;
    }
    
    .btn-start { background: #3b82f6; color: white; }
    .btn-start:hover { background: #2563eb; }
    .btn-stop { background: #ef4444; color: white; display: none; }
    
    .form-group { margin-bottom: 15px; }
    
    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .token-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }
    
    .token-btn {
      aspect-ratio: 1;
      border: 2px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .token-btn:hover { border-color: #3b82f6; background: #1e293b; }
    .token-btn.selected { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    .type-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .type-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .type-btn.selected { background: #10b981; border-color: #10b981; color: white; }
    .type-btn.exit.selected { background: #f59e0b; border-color: #f59e0b; }
    
    .btn-submit {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }
    
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    #result {
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      display: none;
      font-weight: 600;
    }
    
    #result.success { background: #064e3b; color: #6ee7b7; border: 1px solid #10b981; }
    #result.error { background: #450a0a; color: #fca5a5; border: 1px solid #ef4444; }
    
    .spinner {
      display: none;
      width: 30px;
      height: 30px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .scan-hint {
      text-align: center;
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>🎯 In/Out System</h1>
      <p>Scan QR → Select Token → Done</p>
    </div>
    
    <div class="body">
      <div id="reader"></div>
      <button class="btn-cam btn-start" id="startBtn" onclick="startCam()">📷 Open Camera</button>
      <button class="btn-cam btn-stop" id="stopBtn" onclick="stopCam()">⏹ Stop Camera</button>
      <p class="scan-hint">Or skip camera and fill below</p>
      
      <div class="form-group">
        <label>Token Number (1-10)</label>
        <div class="token-grid" id="tokenGrid"></div>
      </div>
      
      <div class="form-group">
        <label>Type</label>
        <div class="type-toggle">
          <button class="type-btn selected" onclick="setType('Entry', this)">🟢 Entry</button>
          <button class="type-btn exit" onclick="setType('Exit', this)">🟠 Exit</button>
        </div>
      </div>
      
      <button class="btn-submit" id="submitBtn" onclick="submit()">✅ OK - Log Attendance</button>
      
      <div class="spinner" id="spinner"></div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    // 🔴 REPLACE THIS WITH YOUR ACTUAL GOOGLE APPS SCRIPT WEB APP URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwqeIxkHN7onuEb0EnbvpNXgb0GBPXYiwdEZbBgDOEqZbeWm_pwsY4VK7yJppnEqRbvMQ/exec';
    
    let scanner;
    let selectedToken = null;
    let selectedType = 'Entry';
    
    const grid = document.getElementById('tokenGrid');
    for (let i = 1; i <= 10; i++) {
      const btn = document.createElement('button');
      btn.className = 'token-btn';
      btn.textContent = i;
      btn.onclick = () => selectToken(i, btn);
      grid.appendChild(btn);
    }
    
    function selectToken(num, btn) {
      selectedToken = num;
      document.querySelectorAll('.token-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }
    
    function setType(type, btn) {
      selectedType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }
    
    function startCam() {
      scanner = new Html5Qrcode('reader');
      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 200, height: 200 } },
        (text) => {
          beep();
          document.querySelector('.scan-hint').textContent = '✅ QR Scanned! Now select token & type';
          document.querySelector('.scan-hint').style.color = '#6ee7b7';
        }
      ).then(() => {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
      });
    }
    
    function stopCam() {
      if (scanner) {
        scanner.stop().then(() => {
          document.getElementById('startBtn').style.display = 'block';
          document.getElementById('stopBtn').style.display = 'none';
        });
      }
    }
    
    function submit() {
      if (!selectedToken) {
        showResult('❌ Select a token number!', 'error');
        return;
      }
      
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      
      const url = `${GAS_URL}?action=log&token=${selectedToken}&type=${selectedType}`;
      
      fetch(url)
        .then(r => r.json())
        .then(data => {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('submitBtn').disabled = false;
          
          if (data.success) {
            showResult(data.message, 'success');
            beep();
            selectedToken = null;
            document.querySelectorAll('.token-btn').forEach(b => b.classList.remove('selected'));
          } else {
            showResult(data.message, 'error');
          }
        })
        .catch(err => {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('submitBtn').disabled = false;
          showResult('❌ Network error', 'error');
        });
    }
    
    function showResult(msg, type) {
      const r = document.getElementById('result');
      r.className = type;
      r.textContent = msg;
      r.style.display = 'block';
      setTimeout(() => { r.style.display = 'none'; }, 3000);
    }
    
    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 1000;
        gain.gain.value = 0.2;
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
      } catch(e) {}
    }
  </script>
</body>
</html>
